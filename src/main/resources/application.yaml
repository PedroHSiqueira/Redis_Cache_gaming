spring:
  application:
    name: Redis_Cache_Gaming
  datasource:
    url: jdbc:postgresql://localhost:5433/gaming_postgres
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
      dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080