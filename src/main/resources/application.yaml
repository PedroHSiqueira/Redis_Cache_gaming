spring:
  application:
    name: Redis_Cache_Gaming
  datasource:
    url: jdbc:postgresql://localhost:5433/gaming_postgres
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  cache:
    type: redis

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
      dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080