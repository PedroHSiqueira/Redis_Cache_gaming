version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: gaming_postgres
    environment:
      POSTGRES_DB: gaming_postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: